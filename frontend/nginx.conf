server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;
    charset utf-8;

    # Resolve DNS dynamically (important for Railway)
    resolver 8.8.8.8 8.8.4.4 valid=10s;
    resolver_timeout 5s;

    # API proxy
    location /api/ {
        proxy_pass BACKEND_URL_PLACEHOLDER;
        proxy_ssl_verify off;  # Skip SSL cert verification for Railway URLs
        proxy_ssl_session_reuse on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing - serve index.html for all non-file/non-api requests
    location / {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
